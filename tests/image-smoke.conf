# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Waits for the container HEALTHCHECK (the scratch
# `knell health` file-marker probe) to report "healthy" - proving the binary
# runs, parses its config, binds the listener, and the probe works. The
# webhook URL is shape-valid but unreachable; with a 30m deadline no
# notification is ever attempted within the smoke window.
SMOKE_APP_NAME=knell
SMOKE_TIMEOUT=90
SMOKE_RUN_ARGS="-e BEATS=smoke:30m -e DISCORD_WEBHOOK_URL=http://127.0.0.1:9/hook -e NODE_NAME=smoke"
